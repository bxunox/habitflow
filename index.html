<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitFlow</title>
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#0f0f10">
</head>
<body>

<header class="top-bar">HabitFlow</header>

<main>
<!-- Dashboard -->
<section id="dashboard" class="view active">
  <div class="card">
    <h2>Daily Progress</h2>
    <p>Habits: <span id="habits-progress">0 / 0</span></p>
    <p>Tasks: <span id="tasks-progress">0 / 0</span></p>
  </div>
</section>

<!-- Habits Section -->
<section id="habits" class="view">
  <h2>Your Habits</h2>
  <div id="habit-list"></div>
</section>

<!-- Tasks Section -->
<section id="tasks" class="view">
  <h2>Today's Tasks</h2>
  <div id="task-list"></div>
  <h3>Completed</h3>
  <div id="completed-list"></div>
</section>
</main>

<!-- Floating Button -->
<button id="fab">+</button>
<div id="fab-menu" class="fab-menu hidden">
  <button id="add-habit">Add Habit</button>
  <button id="add-task">Add Task</button>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <input id="input-name" placeholder="Name" autocomplete="off">
    <button id="save-btn">Save</button>
    <button id="cancel-btn">Cancel</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button data-view="dashboard">Dashboard</button>
  <button data-view="habits">Habits</button>
  <button data-view="tasks">Tasks</button>
</nav>

<script src="app.js"></script>
</body>
</html>
